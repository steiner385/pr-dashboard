name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Build embed bundle
        run: pnpm build:embed

      - name: Build server bundle
        run: pnpm build:server

      - name: Gate — ./server export is plain-node-ESM importable (#200)
        run: |
          # The published ./server must run under plain `node`, not just tsx/bundlers,
          # so no extensionless relative import may survive in the emitted artifact.
          if grep -rhoE "(from|import\() *['\"]\.[^'\"]*['\"]" dist/server --include='*.js' --include='*.d.ts' | grep -vE "\.(js|json)['\"]"; then
            echo "Extensionless relative import in dist/server — tsc-alias -f must resolve full paths (#200)"; exit 1
          fi
          node --input-type=module -e "import('./dist/server/server/backend.js').then(()=>console.log('plain-node ESM import ok')).catch(e=>{console.error(e);process.exit(1)})"

      - name: Gate — no raw NUL bytes in source (use \x00 escapes; #214)
        run: |
          # A raw 0x00 byte makes the whole file read as "binary" to grep/rg.
          # Use a \x00 escape in string/template literals instead.
          if grep -rlP '\x00' server frontend/src --include='*.ts' --include='*.tsx'; then
            echo "Raw NUL byte in source — use a \\x00 escape so files stay greppable (#214)"; exit 1
          fi

      - name: Gate — no absolute /api literals in frontend
        run: |
          if grep -rn "fetch('/api\|fetch(\"/api\|fetch(\`/api\|new EventSource('/api\|new EventSource(\"/api\|new EventSource(\`/api" frontend/src --include='*.ts' --include='*.tsx' | grep -v __tests__; then
            echo "Found absolute /api literal — use useApiBase().apiUrl()"; exit 1
          fi

      - name: Gate — embed CSS is scoped, embed JS has no React root
        run: |
          grep -nE '^\s*(body|html)\s*\{' dist/embed/style.css && { echo "Unscoped body/html in embed CSS"; exit 1; } || true
          grep -q 'react-dom/client' dist/embed/index.js && { echo "Embed bundles a React root"; exit 1; } || true
          echo "embed bundle gates passed"
